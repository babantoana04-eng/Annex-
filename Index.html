<!DOCTYPE html>
<html>
<head>
    <title>Pretty Floral Calculator</title>

    <style>
        * {
            box-sizing: border-box;
        }

        body {
            font-family: Arial, sans-serif;
            background: linear-gradient(135deg, #b76cff, #ff9ecf, #ffd1e8);
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            overflow: hidden;
            position: relative;
        }

        /* Floral decorations */
        .flower {
            position: absolute;
            font-size: 60px;
            opacity: 0.7;
            animation: float 5s infinite ease-in-out;
        }

        .f1 {
            top: 20px;
            left: 30px;
        }

        .f2 {
            top: 50px;
            right: 40px;
        }

        .f3 {
            bottom: 30px;
            left: 50px;
        }

        .f4 {
            bottom: 20px;
            right: 30px;
        }

        @keyframes float {
            0%,100% {
                transform: translateY(0);
            }
            50% {
                transform: translateY(-20px);
            }
        }

        .calculator {
            background: rgba(255,255,255,0.25);
            backdrop-filter: blur(10px);
            padding: 25px;
            border-radius: 25px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.2);
            width: 320px;
            z-index: 1;
        }

        h2 {
            text-align: center;
            color: white;
            margin-bottom: 15px;
        }

        #display {
            width: 100%;
            height: 65px;
            font-size: 30px;
            text-align: right;
            margin-bottom: 15px;
            border: none;
            border-radius: 15px;
            padding: 10px;
            background: rgba(255,255,255,0.8);
        }

        button {
            width: 60px;
            height: 60px;
            margin: 5px;
            font-size: 22px;
            border: none;
            border-radius: 15px;
            cursor: pointer;
            background: #ffffff;
            color: #8e44ad;
            transition: 0.3s;
        }

        button:hover {
            transform: scale(1.1);
            background: #ffd6ec;
        }

        .operator {
            background: #c77dff;
            color: white;
        }

        .equal {
            background: #ff69b4;
            color: white;
            width: 130px;
        }

        .clear {
            background: #ff4d88;
            color: white;
        }

    </style>
</head>

<body>

<div class="flower f1">🌸</div>
<div class="flower f2">🌺</div>
<div class="flower f3">🌷</div>
<div class="flower f4">🌸</div>

<div class="calculator">

<h2>🌸 Calculator 🌸</h2>

<input type="text" id="display" disabled>

<div>
<button class="clear" onclick="clearDisplay()">C</button>
<button onclick="deleteLast()">⌫</button>
<button class="operator" onclick="add('/')">÷</button>
<button class="operator" onclick="add('*')">×</button>
</div>

<div>
<button onclick="add('7')">7</button>
<button onclick="add('8')">8</button>
<button onclick="add('9')">9</button>
<button class="operator" onclick="add('-')">−</button>
</div>

<div>
<button onclick="add('4')">4</button>
<button onclick="add('5')">5</button>
<button onclick="add('6')">6</button>
<button class="operator" onclick="add('+')">+</button>
</div>

<div>
<button onclick="add('1')">1</button>
<button onclick="add('2')">2</button>
<button onclick="add('3')">3</button>
<button onclick="calculate()">=</button>
</div>

<div>
<button onclick="add('0')">0</button>
<button onclick="add('.')">.</button>
<button class="equal" onclick="calculate()">Calculate</button>
</div>

</div>


<script>
let display = document.getElementById("display");

function add(value){
    display.value += value;
}

function clearDisplay(){
    display.value = "";
}

function deleteLast(){
    display.value = display.value.slice(0,-1);
}

function calculate(){
    try{
        display.value = eval(display.value);
    }
    catch{
        display.value = "Error";
    }
}
</script>

</body>
</html>
